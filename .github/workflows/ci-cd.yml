name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-test-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v2
        with:
          push: false
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/devops-quiz-ai:latest

      - name: Run smoke test
        run: |
          docker run -d -p 5000:5000 --name quiz-ai --env-file .env ${{ secrets.DOCKERHUB_USERNAME }}/devops-quiz-ai:latest
          sleep 10
          curl http://localhost:5000/api/health
          docker stop quiz-ai

      - name: Push Docker image
        uses: docker/build-push-action@v2
        with:
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/devops-quiz-ai:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-test-push
    if: github.event_name == 'push'
    steps:
      - name: Trigger deployment to Render
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_URL }}
