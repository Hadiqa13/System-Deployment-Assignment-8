name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # Job 1: Build, test, and push Docker image
  build-test-push:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}  # Docker Hub username stored in secrets
          password: ${{ secrets.DOCKERHUB_TOKEN }}     # Docker Hub token stored in secrets

      # Step 3: Build Docker image (no push yet)
      - name: Build Docker image (no push yet)
        uses: docker/build-push-action@v5
        with:
          push: false
          tags: |
            60301930/devops-quiz-ai:latest
            60301930/devops-quiz-ai:${{ github.sha }}


      # Step 5: Push Docker image (only if the event is 'push')
      - name: Push Docker image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: |
            60301930/devops-quiz-ai:latest
            60301930/devops-quiz-ai:${{ github.sha }}

  # Job 2: Deploy to Render (only on push)
  deploy:
    runs-on: ubuntu-latest
    needs: build-test-push
    if: github.event_name == 'push'
    steps:
      - name: Trigger Render deployment
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_URL }}  # Trigger Render deploy
          echo "Triggered Render deployment" 
          
