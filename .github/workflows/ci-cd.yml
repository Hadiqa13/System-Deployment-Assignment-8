name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # Job 1: Build, test, and push Docker image
  build-test-push:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: 60301930   # Directly using your Docker Hub username
          password: ${{ secrets.DOCKERHUB_TOKEN }}  # Docker Hub token stored in GitHub Secrets

      # Step 3: Build Docker image (no push yet)
      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          push: false
          tags: 60301930/devops-quiz-ai:latest
          tags: 60301930/devops-quiz-ai:${{ github.sha }}

      # Step 4: Smoke test (run container and check /api/health)
      - name: Run smoke test
        run: |
          docker run -d -p 5000:5000 --name quiz-ai --env-file $GITHUB_WORKSPACE/.env 60301930/devops-quiz-ai:latest
          sleep 5
          curl http://localhost:5000/api/health
          docker stop quiz-ai

      # Step 5: Push Docker image (only if the event is 'push')
      - name: Push Docker image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: 60301930/devops-quiz-ai:latest
          tags: 60301930/devops-quiz-ai:${{ github.sha }}
